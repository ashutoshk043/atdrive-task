<header class="flex items-center justify-between h-16 px-4 sm:px-6 lg:px-7 bg-white border-b border-[#e5e5e0]">
  <div class="flex items-center gap-3 min-w-0">
    <button
      type="button"
      class="lg:hidden text-[#6b7088] hover:text-[#1f2230] hover:bg-[#f7f7f5] p-2 rounded-lg -ml-2"
      (click)="sidebarSvc.toggle()"
      aria-label="Open menu"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="h-5 w-5">
        <path d="M4 6h16M4 12h16M4 18h16" stroke-linecap="round"/>
      </svg>
    </button>

    <div class="flex items-baseline gap-3 min-w-0">
      <h1 class="text-[17px] font-semibold text-[#1f2230] tracking-tight truncate">{{ pageTitle }}</h1>
      <span class="hidden sm:inline font-mono text-xs text-[#9a9fb0] whitespace-nowrap">{{ currentTime }}</span>
    </div>
  </div>
