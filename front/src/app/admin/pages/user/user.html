<div class="p-4 sm:p-6">
  <!-- Header -->
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-5">
    <div>
      <h1 class="text-xl font-semibold text-gray-900">Users</h1>
      <p class="text-sm text-gray-500">{{ total }} total users</p>
    </div>
  </div>

  <!-- Table card -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider w-16">
              #
            </th>
            <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">
              Username
            </th>
          </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-100">
          @for (user of users; track user.id; let i = $index) {
            <tr class="hover:bg-gray-50 transition-colors">
              <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                {{ i + 1 }}
              </td>
              <td class="px-6 py-4 whitespace-nowrap">
                <div class="flex items-center gap-3">
                  <span
                    class="flex h-8 w-8 items-center justify-center rounded-full bg-indigo-50 text-xs font-semibold text-indigo-600 shrink-0"
                  >
                    {{ user.username.charAt(0).toUpperCase() }}
                  </span>
                  <span class="text-sm font-medium text-gray-900">{{ user.username }}</span>
                </div>
              </td>
            </tr>
          } @empty {
            <tr>
              <td colspan="2" class="px-6 py-10 text-center text-sm text-gray-500">
                No users found.
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
